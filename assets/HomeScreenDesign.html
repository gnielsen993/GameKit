<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Drawer — Home Screen</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% 0%, #FDF7EC 0%, #F4EAD8 60%, #EBDEC4 100%);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    color: #1A1410;
    display: flex; flex-direction: column; align-items: center;
    padding: 56px 24px 64px;
    gap: 28px;
    -webkit-font-smoothing: antialiased;
  }
  .markrow {
    display: flex; align-items: baseline; gap: 14px;
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 11px; letter-spacing: 1.6px; color: #9C9388;
    text-transform: uppercase;
  }
  .markrow .dot { width: 6px; height: 6px; border-radius: 3px; background: #BC3D2E; }
  .stage { display: flex; gap: 36px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .caption {
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 10.5px; letter-spacing: 1.4px; color: #9C9388;
    text-transform: uppercase; text-align: center;
    margin-top: 14px;
  }
  .frame { display: flex; flex-direction: column; align-items: center; }
  .hint {
    margin-top: 18px; padding: 10px 18px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 999px;
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 11px; letter-spacing: 1.2px; color: #5A4F44;
  }
</style>
</head>
<body>

<div class="markrow">
  <span class="dot"></span>
  <span>gamedrawer · home</span>
</div>

<div id="root"></div>

<div class="hint">TAP ANY GAME TO EXPAND</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="v6-nav.jsx"></script>
<script type="text/babel" src="v7-spring.jsx"></script>
<script type="text/babel" src="v8-icons.jsx"></script>

<script type="text/babel">
  function FinalApp() {
    return (
      <div className="stage">
        <div className="frame">
          <SpringExpandV2/>
          <div className="caption">Home · closed & open states</div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<FinalApp/>);
</script>

</body>
</html>
